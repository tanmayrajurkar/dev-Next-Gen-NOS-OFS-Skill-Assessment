name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -el {0}

jobs:
  build-env:
    name: Build conda environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up micromamba and resolve environment.yml
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          # Cache key tied to environment.yml content; bumping the file
          # automatically invalidates the cache. Bump the trailing -v1
          # suffix to force a rebuild without touching environment.yml.
          cache-environment-key: env-${{ runner.os }}-${{ hashFiles('environment.yml') }}-v1
          cache-downloads-key: downloads-${{ runner.os }}-${{ hashFiles('environment.yml') }}-v1

      - name: Report environment contents
        run: |
          micromamba info
          micromamba list

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    needs: build-env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore conda environment from cache
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          cache-environment-key: env-${{ runner.os }}-${{ hashFiles('environment.yml') }}-v1
          cache-downloads-key: downloads-${{ runner.os }}-${{ hashFiles('environment.yml') }}-v1

      - name: Install package (editable, no deps)
        run: pip install -e . --no-deps

      - name: Run pytest
        run: |
          pytest \
            -m "not network" \
            -n auto \
            --cov=src/ofs_skill \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -o addopts=""

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
